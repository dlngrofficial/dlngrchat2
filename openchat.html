<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DLNGR • Redirecting</title>

<meta http-equiv="refresh" content="0.1; url=https://dlngrchat.free.nf/">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05060d;
    color:#fff;
}

/* Animated Background */
.background{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.background::before,
.background::after{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    filter:blur(90px);
    animation:float 12s ease-in-out infinite alternate;
}

.background::before{
    background:#5a5cff;
    top:-200px;
    left:-150px;
}

.background::after{
    background:#8c3cff;
    bottom:-250px;
    right:-150px;
    animation-delay:2s;
}

@keyframes float{
    from{transform:translateY(0) scale(1);}
    to{transform:translateY(80px) scale(1.2);}
}

.card{
    position:relative;
    z-index:2;
    width:430px;
    padding:50px;
    text-align:center;
    border-radius:28px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:25px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    font-weight:700;
    background:linear-gradient(135deg,#5a5cff,#9b3dff);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.08);}
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

.subtitle{
    color:#bfc5d8;
    line-height:1.6;
    margin-bottom:30px;
}

.progress{
    width:100%;
    height:7px;
    background:rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    border-radius:20px;
    background:linear-gradient(90deg,#5a5cff,#9b3dff);
    animation:load 4s linear forwards;
}

@keyframes load{
    to{width:100%;}
}

.status{
    margin-top:18px;
    color:#c8cde0;
    font-size:14px;
}

a{
    display:inline-block;
    margin-top:28px;
    color:#8fb6ff;
    text-decoration:none;
    transition:.25s;
}

a:hover{
    color:#fff;
}
</style>

<script>
setTimeout(function(){
    window.location.replace("https://dlngrchat.free.nf/");
},4000);
</script>

</head>

<body>

<div class="background"></div>

<div class="card">

<div class="logo">D</div>

<h1>DLNGR Has Moved</h1>

<p class="subtitle">
Welcome to the next generation of DLNGR.<br>
You'll be redirected automatically in a few seconds.
</p>

<div class="progress">
    <div class="bar"></div>
</div>

<p class="status">Redirecting to the new experience...</p>

<a href="https://dlngrchat.free.nf/">
Continue Now →
</a>

</div>

</body>
</html>
